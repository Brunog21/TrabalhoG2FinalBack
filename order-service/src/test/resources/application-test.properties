# =====================================================================
# application-test.properties — order-service
# Perfil ativo: test
# Flyway desabilitado (SERIAL é PostgreSQL-only, incompatível com H2)
# @DataJpaTest já desabilita Flyway e substitui datasource por H2
# =====================================================================

# --- Eureka desabilitado ---
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# --- H2 em memória (usado pelo SpringBootTest / OrderServiceApplicationTests) ---
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- DDL gerenciado pelo Hibernate (sem Flyway) ---
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# --- Flyway desabilitado ---
spring.flyway.enabled=false

# --- Porta do serviço ---
server.port=8200
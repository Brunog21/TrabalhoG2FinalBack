# ==============================================================
# application-test.properties
# Local: src/test/resources/application-test.properties
#
# Configurações de teste do currency-service.
# Ativado com @ActiveProfiles("test") nas classes de teste.
# ==============================================================

# --------------------------------------------------------------
# BANCO DE DADOS H2 (substitui PostgreSQL nos testes)
# Roda em memória, sem necessidade de servidor externo
# --------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Exibe SQL nos logs para facilitar depuração
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --------------------------------------------------------------
# FLYWAY — desabilitado nos testes
# O schema é criado pelo Hibernate via ddl-auto=create-drop
# Evita conflitos com migrations escritas para PostgreSQL
# --------------------------------------------------------------
spring.flyway.enabled=false

# --------------------------------------------------------------
# EUREKA — desabilitado nos testes
# Evita tentativa de conexão com servidor Eureka (localhost:8761)
# --------------------------------------------------------------
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# --------------------------------------------------------------
# OPENFEIGN / CIRCUIT BREAKER — desabilitado nos testes
# BCBClient será mockado nas classes de teste
# --------------------------------------------------------------
spring.cloud.openfeign.circuitbreaker.enabled=false
management.health.circuitbreakers.enabled=false

# --------------------------------------------------------------
# CACHE Caffeine — mantido para testar comportamento de cache
# --------------------------------------------------------------
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=100,expireAfterWrite=15s

# Porta 0 = porta aleatória (evita conflito entre testes)
server.port=0

# --------------------------------------------------------------
# LOGGING — nível DEBUG para ver o que acontece nos testes
# --------------------------------------------------------------
logging.level.br.edu.atitus.currencyservice=DEBUG
logging.level.org.springframework.test=DEBUG
logging.level.org.hibernate.SQL=DEBUG
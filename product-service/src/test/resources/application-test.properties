# ============================================================
# Perfil de teste - desabilita dependências externas
# ============================================================

# Desabilitar Eureka Client
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# H2 em memória para testes com contexto completo (@SpringBootTest)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate cria/destrói schema via entidades (sem Flyway)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Desabilitar Flyway (usa SQL PostgreSQL com 'serial' incompatível com H2)
spring.flyway.enabled=false

# Cache simples para satisfazer @EnableCaching sem precisar de Caffeine
spring.cache.type=simple

# Porta fixa para @Value("${server.port}")
server.port=8000